name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * *" # nightly; catches upstream regressions
  workflow_dispatch:
    inputs:
      fedora_version:
        description: "Fedora version (default 44)"
        default: "44"
        required: false
      job_mode:
        description: "Workflow mode"
        type: choice
        default: full
        options:
          - full
          - e2e-only

env:
  FEDORA_VERSION: ${{ inputs.fedora_version || '44' }}
  IMAGE_NAME: fedora-bootc-starter

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Containerfile

      - name: shellcheck + bash -n
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
          shellcheck -x bootstrap/*.sh bootstrap/core/*.sh bootstrap/hardware/*.sh bootstrap/lib/*.sh scripts/*.sh
          for f in bootstrap/*.sh bootstrap/core/*.sh bootstrap/hardware/*.sh bootstrap/lib/*.sh scripts/*.sh; do
            bash -n "$f"
          done

      - name: yamllint
        run: |
          sudo apt-get install -y yamllint
          yamllint .github/workflows/ files/etc/containers/registries.d/

      - name: TOML parse
        run: |
          RENDERED_CONFIG="$(mktemp)"
          INSTALL_LUKS_PASSPHRASE="fixture-passphrase" \
          ADMIN_PASSWORD_HASH='$6$fixture$hashed-admin-password' \
          EXTRA_KERNEL_APPEND="console=ttyS0,115200 rd.debug" \
            ./scripts/render-installer-config.sh > "$RENDERED_CONFIG"
          python3 -c "import tomllib; tomllib.load(open('$RENDERED_CONFIG','rb'))"
          rm -f "$RENDERED_CONFIG"

  build:
    needs: lint
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.job_mode != 'e2e-only' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_REF: ghcr.io/${{ github.repository_owner }}/fedora-bootc-starter:${{ inputs.fedora_version || '44' }}
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android
          sudo docker system prune -af || true
          df -h /

      - name: Install podman + cosign
        run: |
          sudo apt-get update -y
          sudo apt-get install -y podman

      - uses: sigstore/cosign-installer@v3

      - name: Login to ghcr.io
        run: |
          mkdir -p "$HOME/.docker"
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | podman login --compat-auth-file "$HOME/.docker/config.json" \
                ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Verify cosign.pub is committed
        run: |
          test -f cosign.pub \
            || (echo "cosign.pub missing - run scripts/bootstrap-cosign.sh" && exit 1)

      - name: Build
        run: sudo podman build --build-arg FEDORA_VERSION=$FEDORA_VERSION -t $IMAGE_REF .

      - name: bootc container lint
        run: sudo podman run --rm $IMAGE_REF bootc container lint

      - name: Smoke test (positive + negative assertions, initramfs)
        run: |
          sudo podman run --rm $IMAGE_REF bash -c '
            set -e

            test -x /usr/share/bootstrap/run-profile.sh
            test -x /usr/share/bootstrap/run-all.sh
            test -x /usr/share/bootstrap/core/10-luks-tpm2.sh
            test -x /usr/share/bootstrap/core/13-luks-wipe-installer.sh
            test -x /usr/share/bootstrap/hardware/11-luks-fido2.sh
            test -x /usr/share/bootstrap/hardware/30-fingerprint-enroll.sh
            grep -q "^ExecStart=/usr/share/bootstrap/run-profile.sh core$" /usr/lib/systemd/system/netf-bootstrap.service
            for s in /usr/share/bootstrap/core/[0-9]*.sh \
                     /usr/share/bootstrap/hardware/[0-9]*.sh; do
              test -x "$s"
              bash -n "$s"
            done
            test -f /usr/share/bootstrap/lib/common.sh

            test -f /usr/lib/bootc/kargs.d/10-fw13.toml
            grep -q intel_iommu /usr/lib/bootc/kargs.d/10-fw13.toml

            systemctl is-enabled sshd.service
            systemctl is-enabled netf-bootstrap.service

            test -f /etc/containers/policy.json
            test -f /etc/containers/pubkey.pem
            grep -q /etc/containers/pubkey.pem /etc/containers/policy.json
            test -f /etc/containers/registries.d/ghcr-io-netf.yaml

            command -v chezmoi mise alacritty distrobox tailscale tpm2_pcrread \
                       ykman fido2-token fwupdmgr framework_tool fprintd-enroll sshd \
                       sbverify restic bpftool bpftrace kdeconnectd iio-sensor-proxy

            ! command -v eza
            ! command -v bat
            ! command -v rg
            ! command -v fd
            ! command -v jq
            ! command -v starship

            KVER=$(find /usr/lib/modules -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort -V | tail -1)
            lsinitrd /usr/lib/modules/$KVER/initramfs.img | grep -q cryptsetup
            lsinitrd /usr/lib/modules/$KVER/initramfs.img | grep -q tpm2
            lsinitrd /usr/lib/modules/$KVER/initramfs.img | grep -q ostree

            echo "smoke tests pass"
          '

      - name: Push + sign DIGEST (main only)
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          sudo podman push $IMAGE_REF
          DIGEST=$(sudo podman inspect --format '{{index .RepoDigests 0}}' $IMAGE_REF)
          test -n "$DIGEST"
          echo "Signing $DIGEST"
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > /tmp/cosign.key
          cosign sign --yes --key /tmp/cosign.key "$DIGEST"
          rm -f /tmp/cosign.key

  e2e-vm:
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android
          sudo docker system prune -af || true
          df -h /

      - name: Install QEMU + swtpm + OVMF
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
              qemu-system-x86 qemu-utils ovmf \
              swtpm swtpm-tools \
              podman netcat-openbsd openssh-client \
              xorriso

      - name: Locate OVMF firmware
        run: |
          ls -l /usr/share/OVMF

          OVMF_CODE=""
          OVMF_VARS_TEMPLATE=""

          for candidate in \
              /usr/share/OVMF/OVMF_CODE_4M.fd \
              /usr/share/OVMF/OVMF_CODE.fd; do
            if [[ -f "$candidate" ]]; then
              OVMF_CODE="$candidate"
              break
            fi
          done

          for candidate in \
              /usr/share/OVMF/OVMF_VARS_4M.fd \
              /usr/share/OVMF/OVMF_VARS.fd; do
            if [[ -f "$candidate" ]]; then
              OVMF_VARS_TEMPLATE="$candidate"
              break
            fi
          done

          test -n "$OVMF_CODE" || { echo "ERROR: OVMF code firmware not found"; exit 1; }
          test -n "$OVMF_VARS_TEMPLATE" || { echo "ERROR: OVMF vars firmware not found"; exit 1; }

          echo "Using OVMF_CODE=$OVMF_CODE"
          echo "Using OVMF_VARS_TEMPLATE=$OVMF_VARS_TEMPLATE"
          echo "OVMF_CODE=$OVMF_CODE" >> "$GITHUB_ENV"
          echo "OVMF_VARS_TEMPLATE=$OVMF_VARS_TEMPLATE" >> "$GITHUB_ENV"

      - name: Verify /dev/kvm available
        run: |
          test -c /dev/kvm || { echo "ERROR: /dev/kvm not present on runner"; exit 1; }
          sudo chmod 666 /dev/kvm

      - name: Build image (local tag only)
        run: sudo podman build --build-arg FEDORA_VERSION=$FEDORA_VERSION -t localhost/test-image:ci .

      - name: Generate CI SSH keypair
        run: ssh-keygen -t ed25519 -N '' -f ci-key -C "ci@github-actions"

      - name: Generate CI installer passphrase
        run: |
          INSTALL_LUKS_PASSPHRASE="$(openssl rand -base64 24)"
          echo "::add-mask::$INSTALL_LUKS_PASSPHRASE"
          echo "INSTALL_LUKS_PASSPHRASE=$INSTALL_LUKS_PASSPHRASE" >> "$GITHUB_ENV"
          echo 'ADMIN_PASSWORD_HASH=$6$YdvxSXl6YUHhOzEf$YTvt9PEWKWpTVcb.Y4N/Qlwp.cpMmQbegc8OIFsturFPjOtuYWw4Uzwy5dHlwNiqqiaMd9mfUlJH6wn.EA1Wo0' >> "$GITHUB_ENV"
          echo "EXTRA_KERNEL_APPEND=console=ttyS0,115200 rd.debug systemd.log_level=debug systemd.log_target=console" >> "$GITHUB_ENV"

      - name: Render encrypted installer config
        run: |
          pubkey="$(cat ci-key.pub)"
          EXTRA_SSHKEY_LINES="$(printf '%s\n' \
            "sshkey --username=netf \"$pubkey\"" \
            "sshkey --username=root \"$pubkey\"")"
          export EXTRA_SSHKEY_LINES
          ./scripts/render-installer-config.sh > config-ci-rendered.toml
          python3 -c "import tomllib; tomllib.load(open('config-ci-rendered.toml','rb'))"

      - name: Build installer ISO
        run: |
          mkdir -p output
          sudo podman run --rm --privileged --pull=newer \
              --security-opt label=type:unconfined_t \
              -v /var/lib/containers/storage:/var/lib/containers/storage \
              -v $PWD/config-ci-rendered.toml:/config.toml:ro \
              -v $PWD/output:/output \
              quay.io/centos-bootc/bootc-image-builder:latest \
              --progress verbose \
              --type anaconda-iso --rootfs btrfs --config /config.toml \
              localhost/test-image:ci
          sudo chown -R "$USER" output
          ls -lh output/bootiso/

      - name: Create blank target disk
        run: qemu-img create -f qcow2 target.qcow2 25G

      - name: Start swtpm (emulated TPM2)
        run: |
          mkdir -p /tmp/swtpm
          swtpm socket --tpm2 --tpmstate dir=/tmp/swtpm \
              --ctrl type=unixio,path=/tmp/swtpm/sock \
              --log level=5 --daemon

      - name: Patch installer ISO for headless serial console
        run: |
          # bib's anaconda-iso ships a GRUB config that assumes a physical
          # display. On this headless runner we need anaconda to run on
          # serial so we can watch it + drive it. Patch the boot configs
          # to add `console=ttyS0,115200 inst.text` to every kernel line,
          # then repack the ISO while preserving the hybrid-boot metadata.
          ISO_IN=$(ls output/bootiso/*.iso | head -1)
          test -f "$ISO_IN" || { echo "no installer iso produced"; exit 1; }
          ISO_OUT="$PWD/installer-patched.iso"

          mkdir -p iso-work
          xorriso -osirrox on -indev "$ISO_IN" -extract / iso-work/
          chmod -R u+w iso-work/

          echo "--- original EFI/BOOT/grub.cfg ---"
          cat iso-work/EFI/BOOT/grub.cfg || true
          echo "--- original isolinux.cfg ---"
          cat iso-work/isolinux/isolinux.cfg 2>/dev/null || true

          SERIAL_ARGS="console=ttyS0,115200n8 inst.text"

          if [[ -f iso-work/EFI/BOOT/grub.cfg ]]; then
            sed -i -E "/^[[:space:]]*linux[[:space:]]/ s|\$| $SERIAL_ARGS|" iso-work/EFI/BOOT/grub.cfg
            sed -i -E 's|^(set[[:space:]]+timeout=)[0-9]+|\11|' iso-work/EFI/BOOT/grub.cfg
          fi
          if [[ -f iso-work/isolinux/isolinux.cfg ]]; then
            sed -i -E "/^[[:space:]]*append[[:space:]]/ s|\$| $SERIAL_ARGS|" iso-work/isolinux/isolinux.cfg
            sed -i -E 's|^(timeout[[:space:]]+)[0-9]+|\110|' iso-work/isolinux/isolinux.cfg
          fi

          echo "--- patched EFI/BOOT/grub.cfg ---"
          cat iso-work/EFI/BOOT/grub.cfg || true
          echo "--- patched isolinux.cfg ---"
          cat iso-work/isolinux/isolinux.cfg 2>/dev/null || true

          # Replay boot image metadata from the source ISO, overlay our
          # patched files. This preserves El Torito + Joliet + Rock Ridge
          # without us having to reconstruct the full mkisofs recipe.
          xorriso -indev "$ISO_IN" \
                  -outdev "$ISO_OUT" \
                  -boot_image any replay \
                  -update_r iso-work/ /
          ls -lh "$ISO_OUT"
          echo "ISO=$ISO_OUT" >> "$GITHUB_ENV"

      - name: Run anaconda install (phase 1)
        timeout-minutes: 25
        run: |
          # Boot the patched ISO normally via OVMF. The patched GRUB/isolinux
          # configs add `console=ttyS0 inst.text`, so anaconda runs on serial
          # and we can watch install progress. -no-reboot causes QEMU to
          # exit on anaconda's `reboot --eject` so we don't loop back into
          # the installer.
          cp "$OVMF_VARS_TEMPLATE" anaconda-ovmf-vars.fd
          chmod u+w anaconda-ovmf-vars.fd
          : > anaconda-serial.log
          : > anaconda-qemu.log

          set +e
          qemu-system-x86_64 \
            -machine q35,accel=kvm -cpu host -m 4G -smp 2 \
            -drive if=pflash,format=raw,readonly=on,file=$OVMF_CODE \
            -drive if=pflash,format=raw,file=anaconda-ovmf-vars.fd \
            -chardev socket,id=chrtpm,path=/tmp/swtpm/sock \
            -tpmdev emulator,id=tpm0,chardev=chrtpm \
            -device tpm-crb,tpmdev=tpm0 \
            -drive file=target.qcow2,if=virtio,format=qcow2 \
            -drive file="$ISO",media=cdrom,readonly=on \
            -boot order=d \
            -netdev user,id=n0 \
            -device virtio-net-pci,netdev=n0 \
            -nographic -serial file:anaconda-serial.log -monitor none \
            -display none \
            -no-reboot \
            > anaconda-qemu.log 2>&1 &
          ANACONDA_PID=$!
          echo $ANACONDA_PID > anaconda-qemu.pid

          # Poll serial log while QEMU runs; print progress at key milestones.
          for i in $(seq 1 1500); do
            if ! kill -0 "$ANACONDA_PID" 2>/dev/null; then
              break
            fi
            case $i in
              30|60|120|300|600|900|1200)
                echo "--- anaconda serial tail (${i}s elapsed) ---"
                tail -n 30 anaconda-serial.log || true
                ;;
            esac
            sleep 1
          done
          wait "$ANACONDA_PID"
          status=$?
          set -e

          echo "--- last 200 lines of anaconda serial log ---"
          tail -n 200 anaconda-serial.log || true

          # -no-reboot causes QEMU to exit with status 0 on guest reboot. Any
          # non-zero exit indicates anaconda (or QEMU) failed.
          if [[ $status -ne 0 ]]; then
            echo "Phase 1 QEMU exited with status $status"
            tail -n 200 anaconda-qemu.log || true
            exit 1
          fi
          echo "Phase 1 complete: anaconda install finished."

      - name: Restart swtpm (preserve state dir)
        run: |
          # swtpm exits when phase-1 QEMU disconnects at `-no-reboot`;
          # bring it back up reusing the same state directory so PCRs
          # are consistent across the measured-boot enroll step below.
          pkill -f 'swtpm socket' || true
          rm -f /tmp/swtpm/sock
          swtpm socket --tpm2 --tpmstate dir=/tmp/swtpm \
              --ctrl type=unixio,path=/tmp/swtpm/sock \
              --log level=5 --daemon
          for _ in 1 2 3 4 5; do
            [[ -S /tmp/swtpm/sock ]] && break
            sleep 1
          done
          [[ -S /tmp/swtpm/sock ]] || { echo "swtpm socket never came up"; exit 1; }

      - name: Boot installed system (phase 2, first encrypted boot)
        run: |
          cp "$OVMF_VARS_TEMPLATE" ovmf-vars.fd
          chmod u+w ovmf-vars.fd
          : > vm-serial.log
          : > qemu-launch.log
          rm -f vm-serial.in vm-serial.out
          mkfifo vm-serial.in vm-serial.out

          tail -f vm-serial.out > vm-serial.log &
          echo $! > serial-tail.pid

          tail -f /dev/null > vm-serial.in &
          echo $! > serial-stdin-holder.pid

          # Phase 2 boots target.qcow2 via OVMF (real UEFI + measured boot).
          # The installed kernel args include console=ttyS0 via
          # EXTRA_KERNEL_APPEND so the first LUKS prompt appears on serial.
          qemu-system-x86_64 \
            -machine q35,accel=kvm -cpu host -m 4G -smp 2 \
            -drive if=pflash,format=raw,readonly=on,file=$OVMF_CODE \
            -drive if=pflash,format=raw,file=ovmf-vars.fd \
            -chardev socket,id=chrtpm,path=/tmp/swtpm/sock \
            -tpmdev emulator,id=tpm0,chardev=chrtpm \
            -device tpm-crb,tpmdev=tpm0 \
            -drive file=target.qcow2,if=virtio,format=qcow2 \
            -netdev user,id=n0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=n0 \
            -nographic -serial pipe:vm-serial \
            -display none \
            > qemu-launch.log 2>&1 &
          echo $! > qemu.pid
          sleep 5
          if ! kill -0 "$(cat qemu.pid)" 2>/dev/null; then
            echo "QEMU exited during early boot"
            tail -n 200 qemu-launch.log || true
            tail -n 200 vm-serial.log || true
            exit 1
          fi

      - name: Wait for first encrypted boot; inject passphrase
        timeout-minutes: 10
        run: |
          for i in $(seq 1 600); do
            if grep -qi 'Passphrase' vm-serial.log; then
              printf '%s\n' "$INSTALL_LUKS_PASSPHRASE" > vm-serial.in
              echo "sent LUKS passphrase over serial (after ${i}s)"
              exit 0
            fi
            if [[ -f qemu.pid ]] && ! kill -0 "$(cat qemu.pid)" 2>/dev/null; then
              echo "QEMU exited before LUKS passphrase prompt"
              tail -n 200 qemu-launch.log || true
              tail -n 400 vm-serial.log || true
              exit 1
            fi
            case $i in
              60|300)
                echo "Still waiting for LUKS prompt (${i}s elapsed)"
                tail -n 30 vm-serial.log || true
                ;;
            esac
            sleep 1
          done
          echo "LUKS passphrase prompt never appeared"
          tail -n 200 qemu-launch.log || true
          tail -n 400 vm-serial.log || true
          exit 1

      - name: Wait for SSH (up to 5 min)
        run: |
          for i in {1..30}; do
            if ssh -i ci-key -o StrictHostKeyChecking=no \
                   -o UserKnownHostsFile=/dev/null \
                   -o ConnectTimeout=5 \
                   -p 2222 netf@localhost true 2>/dev/null; then
              echo "SSH up after ${i} attempt(s)"
              exit 0
            fi
            if (( i == 1 || i % 6 == 0 )); then
              echo "VM serial log excerpt (attempt ${i})"
              tail -n 40 vm-serial.log || true
            fi
            if [[ -f qemu.pid ]] && ! kill -0 "$(cat qemu.pid)" 2>/dev/null; then
              echo "QEMU exited before SSH came up"
              tail -n 200 qemu-launch.log || true
              tail -n 200 vm-serial.log || true
              exit 1
            fi
            sleep 10
          done
          echo "SSH never came up"
          tail -n 200 qemu-launch.log || true
          tail -n 200 vm-serial.log || true
          exit 1

      - name: Verify system state in VM
        run: |
          USER_SSH="ssh -i ci-key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 2222 netf@localhost"
          ROOT_SSH="ssh -i ci-key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 2222 root@localhost"

          echo "Basic system"
          $USER_SSH 'cat /etc/os-release | grep VERSION'
          $ROOT_SSH 'bootc status'
          $ROOT_SSH 'systemctl is-system-running || true'

          echo "Image-baked tooling"
          $ROOT_SSH 'command -v chezmoi mise alacritty framework_tool'
          $ROOT_SSH 'command -v tpm2_pcrread ykman fwupdmgr sbverify'

          echo "TPM2 visible via swtpm"
          $ROOT_SSH 'tpm2_pcrread sha256:7,11'

          echo "sbverify available"
          $ROOT_SSH 'sbverify --help >/dev/null'

          echo "LUKS enrollment state"
          $ROOT_SSH "set -e; \
            MAPPER=\$(findmnt -no SOURCE / | sed 's,.*/,,'); \
            DEV=\$(cryptsetup status \"\$MAPPER\" | awk '/device:/ {print \$2}'); \
            cryptsetup luksDump \"\$DEV\" > /tmp/luks.dump; \
            grep -q systemd-tpm2 /tmp/luks.dump; \
            grep -q systemd-recovery /tmp/luks.dump; \
            ! grep -qE '^\\s*0:\\s+luks2' /tmp/luks.dump; \
            echo 'installer keyslot 0 removed'"

          echo "Rebooting for second boot - no passphrase injection"
          $ROOT_SSH 'systemctl reboot' || true
          sleep 10
          for i in {1..30}; do
            if $USER_SSH true 2>/dev/null; then
              echo "SSH up on second boot after ${i} attempt(s)"
              break
            fi
            if [[ -f qemu.pid ]] && ! kill -0 "$(cat qemu.pid)" 2>/dev/null; then
              echo "QEMU exited before second boot SSH came up"
              tail -n 200 qemu-launch.log || true
              tail -n 200 vm-serial.log || true
              exit 1
            fi
            if [[ $i -eq 30 ]]; then
              echo "SSH never came up on second boot"
              tail -n 200 qemu-launch.log || true
              tail -n 200 vm-serial.log || true
              exit 1
            fi
            sleep 10
          done

          echo "Hardware-gated scripts skip gracefully"
          $ROOT_SSH '/usr/share/bootstrap/hardware/40-framework-ec.sh --check' 2>&1 | grep -i 'skip\|not a framework'
          $ROOT_SSH '/usr/share/bootstrap/hardware/30-fingerprint-enroll.sh --check' 2>&1 | grep -i 'skip\|no fingerprint'
          $ROOT_SSH '/usr/share/bootstrap/hardware/11-luks-fido2.sh --check' 2>&1 | grep -i 'skip\|no yubikey\|not luks\|n/a'
          $ROOT_SSH '/usr/share/bootstrap/core/05-firmware-update.sh --check' 2>&1 | grep -i 'skip\|vm'

          echo "run-all.sh --check terminates 0"
          $ROOT_SSH '/usr/share/bootstrap/run-all.sh --check'

          echo "e2e VM test passed"

      - name: Shutdown VM
        if: always()
        run: |
          ssh -i ci-key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -p 2222 root@localhost 'systemctl poweroff' || true
          sleep 5
          [[ -f qemu.pid ]] && kill -9 "$(cat qemu.pid)" 2>/dev/null || true
          [[ -f serial-tail.pid ]] && kill -9 "$(cat serial-tail.pid)" 2>/dev/null || true
          [[ -f serial-stdin-holder.pid ]] && kill -9 "$(cat serial-stdin-holder.pid)" 2>/dev/null || true

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vm-logs
          path: |
            vm-serial.log
            qemu-launch.log
            anaconda-serial.log
            anaconda-qemu.log
          retention-days: 7

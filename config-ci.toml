# CI-mode bootc-image-builder config: qcow2 output with SSH key injection,
# no LUKS, keeping end-to-end VM boots simple and fast.

[[customizations.user]]
name = "netf"
groups = ["wheel"]
key = "{{CI_PUBKEY}}"

[[customizations.user]]
name = "root"
key = "{{CI_PUBKEY}}"

[customizations.kernel]
append = "console=ttyS0,115200"
